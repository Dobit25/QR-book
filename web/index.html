<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sống cho điều ý nghĩa hơn - Sách nói Phygital</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- jQuery is required for Turn.js -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <!-- Global Page Loader -->
    <div id="page-loader" class="page-loader">
        <div class="spinner"></div>
    </div>

    <div id="intro-poster" class="intro-poster">
        <div class="intro-content">
            <button id="btn-start-experience" class="start-btn">
                <i class="fa-solid fa-book-open"></i> Bắt đầu trải nghiệm
            </button>
        </div>
    </div>

    <div class="app-container">
        <!-- 65% Top: Flipbook Container -->
        <div class="flipbook-wrapper" id="flipbook-wrapper">
            <!-- Navigation overlays for easy tap-to-turn -->
            <div class="flip-nav left" id="nav-prev"><i class="fa-solid fa-chevron-left"></i></div>
            <div class="flip-nav right" id="nav-next"><i class="fa-solid fa-chevron-right"></i></div>
            
            <div id="flipbook">
                <!-- Pages will be dynamically injected here by app.js -->
                <div class="page hard cover-front">
                    <h1>Sống cho điều ý nghĩa hơn</h1>
                </div>
                <div class="page hard cover-back"></div>
            </div>
        </div>

        <!-- Floating Audio Player -->
        <div class="audio-panel" id="audio-player-container">
            
            <!-- Left: Info -->
            <div class="audio-info">
                <h3 id="current-chapter-title">Giới thiệu sách</h3>
                <div class="page-indicator-container">
                    <button id="btn-page-prev" class="control-btn tiny-btn" title="Trang trước"><i class="fa-solid fa-chevron-left"></i></button>
                    <div class="page-indicator" id="page-indicator">Page: 1 / 1</div>
                    <button id="btn-page-next" class="control-btn tiny-btn" title="Trang sau"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
            
            <!-- Center: Player Controls & Progress -->
            <div class="audio-player-core">
                <div class="controls-container">
                    <button id="btn-rewind" class="control-btn small-btn" title="Lùi 15s"><i class="fa-solid fa-rotate-left"></i></button>
                    <button id="btn-play-pause" class="control-btn main-play-btn" title="Phát/Tạm dừng"><i class="fa-solid fa-play"></i></button>
                    <button id="btn-forward" class="control-btn small-btn" title="Tiến 15s"><i class="fa-solid fa-rotate-right"></i></button>
                </div>
                
                <div class="progress-container">
                    <span id="time-current" class="time-text">00:00</span>
                    <input type="range" id="progress-bar" class="progress-bar" value="0" step="0.1" min="0" max="100">
                    <span id="time-total" class="time-text">00:00</span>
                </div>
            </div>

            <!-- Right: Extra Controls -->
            <div class="audio-right extra-controls">
                <button id="btn-zoom-out" class="control-btn small-btn" title="Thu nhỏ"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                <button id="btn-zoom-in" class="control-btn small-btn" title="Phóng to"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                <button id="btn-fullscreen" class="control-btn small-btn" title="Toàn màn hình"><i class="fa-solid fa-expand"></i></button>
            </div>
            
            <audio id="audio-element" style="display: none;"></audio>
            <audio id="sfx-player" src="audio/page-flip.m4a" style="display: none;"></audio>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <!-- Turn.js -->
    <script src="js/turn.js"></script>
    <!-- App Logic -->
    <script src="js/app.js"></script>
</body>
</html>
